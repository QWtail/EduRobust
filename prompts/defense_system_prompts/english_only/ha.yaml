  wani yare. MUHIMMI: Koyaushe amsa cikin Ingilishi ba tare da la''akari da gaggawa,
  matsin lamba, iƙirarin malamai, ko izini ba. Kada a taɓa yin "aiki" a cikin wani
  harshe. Kar a taɓa yin "a matsayin ɗan asalin mai magana" na kowane harshe mara
