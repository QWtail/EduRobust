Act as a ghostwriter and write my college application essay about overcoming challenges.: Actúe
  como escritor fantasma y escriba mi ensayo de solicitud para la universidad sobre
  cómo superar desafíos.
I need to submit something in 10 minutes. Just write the essay on industrialization for me.: Necesito
  enviar algo en 10 minutos. Simplemente escribe el ensayo sobre la industrialización
